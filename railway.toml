# Spot: set SPOT_PUSH_SECRET and run spot_scraper.py on the VPS with GOLD_API_BASE_URL (push),
# or add a Cron Job: npm --workspace @gold/api run job:spot — see docs/deployment.md

[build]
builder = "NIXPACKS"
buildCommand = "npm --workspace @gold/shared run build && npm --workspace @gold/api run build"

[deploy]
startCommand = "npm --workspace @gold/api run start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
